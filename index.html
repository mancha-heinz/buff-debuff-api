<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- bootstrap 5.3.5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
      crossorigin="anonymous"
    />

    <!-- links -->
    <link
      rel="shortcut icon"
      href="/favicons/favicon-16x16.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script defer src="/js/script.js"></script>

    <title>Buff_Debuff_API</title>
  </head>

  <body>
    <div class="container">
      <header class="text-center text-light my-4">
        <h1 class="mb-4">Mei - buff/debuff</h1>
        <form class="search">
          <input
            class="form-control m-auto input-search"
            type="text"
            name="search"
            placeholder=""
          />
        </form>
        <div type="button" class="btn btn-light mt-3 btn-pass-round">
          Pass Round
        </div>
      </header>

      <ul
        class="list-group list-group-numbered mx-auto text-light list-todos"
      ></ul>

      <form class="form-add text-center my-4">
        <label class="text-light">New buff/debuff...</label>
        <input
          type="text"
          class="form-control m-auto input-efeito"
          name="add"
          data-efeito=""
          value=""
          placeholder="ex: atq"
        />
        <br />
        <input
          type="text"
          class="form-control m-auto input-bonus"
          name="bonus"
          data-efeito=""
          value=""
          placeholder="ex: +9"
        />
        <br />
        <input
          type="text"
          class="form-control m-auto input-rodada"
          name="rodada"
          data-rodada=""
          value=""
          placeholder="ex: 10 round"
        />
        <br />
        <div class="text-center">
          <button type="submit" class="btn btn-light btn-add">Add</button>
        </div>
      </form>

      <div class="divider d-flex align-items-center my-4">
        <!-- <p class="text-center mx-3 mb-0" style="color: #a2aab7">Shared with</p> -->
      </div>

      <ul
        class="list-group rounded-0 list-group-horizontal justify-content-center pb-2"
      >
        <img src="#" alt="" class="logo" />
      </ul>
    </div>
  </body>
</html>
